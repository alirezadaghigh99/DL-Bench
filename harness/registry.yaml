# DL-Bench repository registry.
#
# Each entry maps a `repo` value (as it appears in the dataset) to the Docker
# image that has the repo cloned and installed, plus the path inside the image
# where the clone lives. `ground Truth` and `test_cases` from the dataset are
# interpreted relative to `repo_dir`.
#
# Add a new repo by:
#   1. Putting a Dockerfile in dockerfiles/<repo>/
#   2. Building it as dlbench/<repo>:latest
#   3. Adding an entry below.

defaults:
  python_bin: python
  pytest_args: ["-p", "no:cacheprovider", "--tb=short", "-q"]
  timeout_s: 300

repos:
  kornia:
    image: dlbench/kornia:latest
    repo_dir: /app/kornia

  GPflow:
    image: dlbench/gpflow:latest
    repo_dir: /app/GPflow

